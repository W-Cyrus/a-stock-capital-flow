<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; background: #070B18; font-family: 'PingFang SC', 'Heiti SC', sans-serif; }

  /* 顶部标题栏 */
  .header { position: absolute; top: 0; left: 0; width: 1080px; height: 260px;
    padding: 45px 50px 20px 50px;
    background: linear-gradient(180deg, rgba(13,22,48,0.95) 0%, rgba(7,11,24,0) 100%);
  }
  .date-row { display: flex; align-items: center; gap: 20px; margin-bottom: 12px; }
  .date-text { font-size: 56px; font-weight: 800; color: #F8FAFC; letter-spacing: 2px; }
  .session-tag { font-size: 30px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #FF4D4F 0%, #FF7875 100%);
    padding: 6px 22px; border-radius: 10px; }
  .main-title { font-size: 76px; font-weight: 900; color: #F8FAFC;
    text-shadow: 0 0 40px rgba(100,149,237,0.4); letter-spacing: 4px; }
  .index-box { position: absolute; top: 55px; right: 50px;
    background: rgba(30,41,59,0.6); border: 1px solid rgba(148,163,184,0.2);
    border-radius: 16px; padding: 18px 28px; text-align: right; }
  .index-name { font-size: 26px; color: #94A3B8; margin-bottom: 8px; }
  .index-value { font-size: 38px; font-weight: 800; color: #F8FAFC; }
  .index-change { font-size: 28px; font-weight: 700; color: #94A3B8; margin-top: 4px; }

  /* 图例 */
  .legend { position: absolute; top: 285px; left: 50px; display: flex; gap: 36px; }
  .legend-item { display: flex; align-items: center; font-size: 28px; font-weight: 700; }
  .legend-dot { width: 18px; height: 18px; border-radius: 50%; margin-right: 12px;
    box-shadow: 0 0 14px currentColor; }
  .in-color { color: #FF4D4F; }
  .out-color { color: #52C41A; }

  /* 主内容区 */
  .board { position: absolute; top: 345px; left: 30px; width: 1020px; height: 1420px;
    background: rgba(15,23,42,0.5); border: 1px solid rgba(100,149,237,0.12);
    border-radius: 24px; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,0,0,0.4); }

  /* 每个分区标题 */
  .section { position: relative; }
  .section-header { height: 70px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 30px; }
  .section-title { font-size: 32px; font-weight: 800; }
  .section-sub { font-size: 22px; color: #94A3B8; }
  .in-section { background: linear-gradient(90deg, rgba(255,77,79,0.18) 0%, rgba(255,77,79,0.05) 100%); }
  .in-section .section-title { color: #FF7875; }
  .out-section { background: linear-gradient(90deg, rgba(82,196,26,0.18) 0%, rgba(82,196,26,0.05) 100%); }
  .out-section .section-title { color: #73D13D; }

  /* 行 */
  .row { position: relative; height: 62px; display: flex; align-items: center;
    padding: 0 24px 0 20px; }
  .row:nth-child(odd) { background: rgba(255,255,255,0.02); }
  .rank { width: 50px; height: 50px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; font-size: 26px; font-weight: 800;
    color: #F8FAFC; flex-shrink: 0; }
  .rank-1 { background: linear-gradient(135deg, #FF4D4F 0%, #FF7875 100%); box-shadow: 0 0 16px rgba(255,77,79,0.5); }
  .rank-2 { background: linear-gradient(135deg, #F759AB 0%, #FF85C0 100%); box-shadow: 0 0 14px rgba(247,89,171,0.4); }
  .rank-3 { background: linear-gradient(135deg, #FAAD14 0%, #FFC53D 100%); box-shadow: 0 0 14px rgba(250,173,20,0.4); }
  .rank-other { background: rgba(30,41,59,0.8); color: #94A3B8; border: 1px solid rgba(148,163,184,0.2); }

  .flow-tag { width: 64px; height: 34px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; font-size: 20px; font-weight: 700;
    margin-left: 18px; flex-shrink: 0; }
  .tag-in { background: rgba(255,77,79,0.2); color: #FF7875; border: 1px solid rgba(255,77,79,0.35); }
  .tag-out { background: rgba(82,196,26,0.2); color: #73D13D; border: 1px solid rgba(82,196,26,0.35); }

  .sector-name { width: 190px; font-size: 30px; font-weight: 700; color: #F8FAFC;
    margin-left: 18px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }

  .bar-track { flex: 1; height: 22px; background: rgba(30,41,59,0.8); border-radius: 11px;
    margin: 0 22px; position: relative; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 11px; width: 0%;
    background: linear-gradient(90deg, rgba(255,255,255,0.2) 0%, currentColor 60%, currentColor 100%);
    box-shadow: 0 0 20px currentColor; position: relative; }
  .bar-fill::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 60px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.4) 100%); }

  .sector-value { width: 160px; font-size: 32px; font-weight: 800; color: #F8FAFC;
    text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  .footer { position: absolute; bottom: 25px; left: 0; width: 1080px;
    text-align: center; font-size: 24px; color: #64748B; }
</style>
</head>
<body>
<div class="header">
  <div class="date-row">
    <span class="date-text" id="dateText">06月17日</span>
    <span class="session-tag" id="sessionTag">收盘</span>
  </div>
  <div class="main-title">主力板块资金流向</div>
  <div class="index-box">
    <div class="index-name">上证指数</div>
    <div class="index-value" id="indexValue">--</div>
    <div class="index-change" id="indexChange">--</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item in-color"><span class="legend-dot" style="background:#FF4D4F;color:#FF4D4F"></span>主力净流入</div>
  <div class="legend-item out-color"><span class="legend-dot" style="background:#52C41A;color:#52C41A"></span>主力净流出</div>
</div>

<div class="board" id="board">
  <div class="section in-section">
    <div class="section-header">
      <span class="section-title">净流入 TOP10</span>
      <span class="section-sub">按净流入金额排序</span>
    </div>
    <div id="inRows"></div>
  </div>
  <div class="section out-section">
    <div class="section-header">
      <span class="section-title">净流出 TOP10</span>
      <span class="section-sub">按净流出金额排序</span>
    </div>
    <div id="outRows"></div>
  </div>
</div>

<div class="footer">仅作公开信息整理，不构成投资建议</div>

<script>
const IN_COLOR = '#FF4D4F';
const OUT_COLOR = '#52C41A';

function createRow(item, idx, type) {
  const isIn = type === 'in';
  const rankClass = idx < 3 ? `rank-${idx + 1}` : 'rank-other';
  const tagClass = isIn ? 'tag-in' : 'tag-out';
  const tagText = isIn ? '流入' : '流出';
  const color = isIn ? IN_COLOR : OUT_COLOR;
  const sign = isIn ? '+' : '-';
  const absVal = Math.abs(item.value);

  const row = document.createElement('div');
  row.className = 'row';
  row.innerHTML = `
    <div class="rank ${rankClass}">${idx + 1}</div>
    <div class="flow-tag ${tagClass}">${tagText}</div>
    <div class="sector-name" title="${item.name}">${item.name}</div>
    <div class="bar-track">
      <div class="bar-fill" style="color:${color}; width:0%" data-target="${item.pct}"></div>
    </div>
    <div class="sector-value" style="color:${color}">${sign}${absVal.toFixed(item.value >= 100 || absVal >= 100 ? 0 : 1)}亿</div>
  `;
  return row;
}

window.__set_bar_data = function(data) {
  document.getElementById('dateText').textContent = data.dateText;
  document.getElementById('sessionTag').textContent = data.sessionTag;
  document.getElementById('indexValue').textContent = data.indexValue || '--';
  document.getElementById('indexChange').textContent = data.indexChange || '--';
  if (data.indexChange && data.indexChange.includes('+')) {
    document.getElementById('indexChange').style.color = '#FF7875';
  } else if (data.indexChange && data.indexChange.includes('-')) {
    document.getElementById('indexChange').style.color = '#73D13D';
  }

  const inContainer = document.getElementById('inRows');
  const outContainer = document.getElementById('outRows');
  inContainer.innerHTML = '';
  outContainer.innerHTML = '';

  data.in.forEach((item, idx) => inContainer.appendChild(createRow(item, idx, 'in')));
  data.out.forEach((item, idx) => outContainer.appendChild(createRow(item, idx, 'out')));
};

window.__set_bar_progress = function(progress) {
  document.querySelectorAll('.bar-fill').forEach(bar => {
    const target = parseFloat(bar.dataset.target);
    bar.style.width = (target * progress) + '%';
  });
  // 数值跟随动画
  document.querySelectorAll('.row').forEach(row => {
    const valEl = row.querySelector('.sector-value');
    const finalText = valEl.dataset.final;
    if (!finalText) {
      valEl.dataset.final = valEl.textContent;
    }
    // 解析符号和值
    const final = valEl.dataset.final;
    const sign = final[0];
    const suffix = final.endsWith('亿') ? '亿' : '';
    const num = parseFloat(final.slice(1, -suffix.length));
    const cur = num * progress;
    if (cur >= 100 || num >= 100) {
      valEl.textContent = sign + Math.round(cur) + suffix;
    } else {
      valEl.textContent = sign + cur.toFixed(1) + suffix;
    }
  });
};
</script>
</body>
</html>
